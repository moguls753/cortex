name: cortex

services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cortex}:${POSTGRES_PASSWORD:?required}@postgres:5432/${POSTGRES_DB:-cortex}
      - OLLAMA_URL=http://ollama:11434
      - WHISPER_URL=http://whisper:8000
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_USER
      - SMTP_PASS
      - DIGEST_EMAIL_FROM=${DIGEST_EMAIL_FROM:-${SMTP_USER}}
      - TZ=${TZ:-Europe/Berlin}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
      whisper:
        condition: service_started

  postgres:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cortex}
      POSTGRES_USER: ${POSTGRES_USER:-cortex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cortex}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama

  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    environment:
      WHISPER__MODEL: medium
      WHISPER__DEVICE: cpu
      PRELOAD_MODELS: '["Systran/faster-whisper-medium"]'
    volumes:
      - whisper_data:/root/.cache/huggingface
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 300s

volumes:
  postgres_data:
    name: cortex_postgres_data
  ollama_data:
    name: cortex_ollama_data
  whisper_data:
    name: cortex_whisper_data
